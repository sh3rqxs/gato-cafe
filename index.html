<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gato Café</title>
  <link rel="icon" href="assets/images/logo/paw-logo.svg" type="image/svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="nav-container">
    <div class="nav-content">

      <!-- Logo + Café Name -->
      <div class="logo-container">
        <a href="#">
          <img class="glow-on-bounce" id="logo"
               alt="Logo"
               src="assets/images/logo/paw-logo.svg"
               width="40" height="40"
               loading="eager"/>
        </a>
        <h2 class="color-change-text" id="cafe-name">Gato Café</h2>
      </div>

      <!-- Nav Links -->
      <div class="links-container">
        <ul>
         <li class="nav-link underline-slide"><a href="#about">About</a></li>
         <li class="nav-link underline-slide"><a href="#menu">Menu</a></li>
         <li class="nav-link underline-slide"><a href="#order">Order</a></li>
        </ul>
      </div>

      <!-- Nav Icons -->
      <div class="icons-container">
        
        <!-- Download Menu -->
        <button class="icon-btn glow-on-bounce">
          <a href="#">
            <img id="download-menu-icon"
                 alt="Download Menu"
                 src="assets/images/ui/download-menu-icon.svg"
                 width="39" height="36"
                 loading="eager"/>
            <span class="badge">Download Menu</span>
          </a>
        </button>
        
        <!-- Play Game -->
        <button class="icon-btn glow-on-bounce">
          <a href="#">
            <img id="game-icon"
                 alt="Play Game"
                 src="assets/images/ui/game-icon.svg"
                 width="43" height="36"
                 loading="eager"/>
            <span class="badge">Play Game</span>
          </a>
        </button>

        <!-- Music -->
        <button class="icon-btn glow-on-bounce" onclick="toggleMusic()">

          <!-- Off State -->
          <img id="music-off-icon"
               alt="Music Off"
               src="assets/images/ui/music-off-icon.svg"
               width="32" height="36"
               loading="eager"/>

          <!-- On State -->
          <img id="music-on-icon"
               alt="Music On"
               src="assets/images/ui/music-on-icon.svg"
               width="32" height="36"
               style="display: none;"
               loading="eager"/>

          <!-- Initial State Label -->
          <span class="badge" id="label">Music Off</span>
        </button>
      </div>

    </div>
  </nav>

  <!-- Hero -->
  <header class="hero-container" id="about">
    <section class="hero-content">

      <!-- Hero Text --> 
      <div class="hero-text">
        <p id="intro-tagline"><span id="typing-text">Loading...</span>
                              <span id="cursor">|</span></p>
        <h1 class="floating-text" id="gato-cafe">Gato Café</h1>
        <p id="cafe-desc">A quiet corner for people who love cats, coffee,
                      and slow mornings. Come as you are. Stay as long 
                      as you like! ♡</p>
      </div>

      <!-- Hero Buttons -->
      <div class="hero-btns">
        <button class="cta-btn" id="primary-btn"><a href="#">Browse Menu ▶</a></button>
        <button class="cta-btn" id="secondary-btn"><a href="#">Place an Order</a></button>
      </div>
      
      <!-- Hero Image -->
      <div class="hero-image glow-on-bounce">
        <img id="gato"
             alt="Hero Image"
             src="assets/images/hero-image/gato-image.svg"
             width="552" height="460"
             loading="eager"/>
      </div>
    </section>
  </header>

  <!-- Footer -->
  <footer class="footer-container">
    <div class="footer-content">
      <p id="thanks">Thanks for visiting!</p>
      <p id="credits">Made with love by <a class="underline-slide" href="https://www.codedex.io/@sh3rqxs" target="_blank">@shercodes</a></p>
      <a href="https://github.com/sh3rqxs" target="_blank">
        <img class="color-change-img"
             id="github-profile"
             alt="GitHub Profile"
             src="assets/images/social-media/github-profile-icon.svg"
             width="32" height="32"/>
      </a>
    </div>
  </footer>

  <!-- Background Music -->
  <audio id="bg-music" loop>
    <source src="assets/music/11 - sweet cafe.mp3" type="audio/mpeg"/>
  </audio>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
